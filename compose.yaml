services:
  laravel-service:
    container_name: laravel-container
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./laravel-app:/var/www/html
      - ./docker/laravel/entrypoint.development.sh:/usr/local/bin/entrypoint.development.sh
    ports:
      - "8000:8000"
    depends_on:
      mysql-service:
        condition: service_healthy
    command: ["bash", "/usr/local/bin/entrypoint.development.sh"]

  vuejs-service:
    container_name: vuejs-container
    build:
      context: .
      dockerfile: docker/vuejs/Dockerfile
    working_dir: /app
    volumes:
      - ./vuejs-app:/app
      - ./docker/vuejs/entrypoint.development.sh:/usr/local/bin/entrypoint.development.sh
    ports:
      - "5173:5173"
    depends_on:
      - laravel-service
    command: ["sh", "/usr/local/bin/entrypoint.development.sh"]

  mysql-service:
    image: mysql:8.0
    container_name: mysql-container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: chatsystem_zeckerithy
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: password_user
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: phpmyadmin-container
    restart: unless-stopped
    depends_on:
      - mysql-service
    environment:
      UPLOAD_LIMIT: 50M
      PMA_HOST: mysql-service
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "9000:80"

volumes:
  mysql_data: